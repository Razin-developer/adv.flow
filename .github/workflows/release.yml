name: "Build and Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libx11-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev


      - name: install frontend dependencies
        run: npm install
        working-directory: tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "AdvFlow v__VERSION__"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: true
          prerelease: false
          projectPath: tauri
          includeRelease: true

      - name: Build CLI Installer (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd tauri/src-tauri/windows
          if (!(Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
            choco install nsis -y
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" cli-installer.nsi
          Move-Item AdvFlow-CLI-Setup.exe ../../../AdvFlow-CLI-Setup.exe

      - name: Upload Standalone CLI Artifacts
        shell: bash
        run: |
          BIN_EXT=""
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then BIN_EXT=".exe"; fi
          # The binary is built by tauri-action's beforeBuildCommand
          cp tauri/src-tauri/target/release/advflow-cli${BIN_EXT} ./advflow-cli-${{ matrix.platform }}${BIN_EXT}
          
      - name: Upload Extra Assets to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            AdvFlow-CLI-Setup.exe
            advflow-cli-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

