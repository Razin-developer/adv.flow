name: "Build and Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libx11-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev


      - name: install frontend dependencies
        run: npm install
        working-directory: tauri

      - name: Build CLI Binary (Standalone)
        run: cargo build --release --bin advflow-cli
        working-directory: tauri/src-tauri

      - name: Build CLI Installer (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $makensis = "$env:LOCALAPPDATA\tauri\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) {
            # Install NSIS if not present (usually tauri-action handles this, but we are running manually here)
            # Actually, we can just wait for tauri-action to install it, or install it via winget/choco
            # But tauri-apps/tauri-action installs it automatically during its run.
            # To be safe, we'll run this AFTER the tauri-action step or install it now.
            choco install nsis -y
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          cd tauri/src-tauri/windows
          & $makensis cli-installer.nsi
          Move-Item AdvFlow-CLI-Setup.exe ../../../AdvFlow-CLI-Setup.exe

      - name: Prepare Standalone CLI (Non-Windows)
        if: matrix.platform != 'windows-latest'
        run: |
          cp tauri/src-tauri/target/release/advflow-cli ./advflow-cli-${{ matrix.platform }}
        shell: bash

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with the version from tauri.conf.json
          releaseName: "AdvFlow v__VERSION__"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: true
          prerelease: false
          projectPath: tauri
          includeRelease: true
          # We can add our extra artifacts here
          includeArtifacts: |
            AdvFlow-CLI-Setup.exe
            advflow-cli-*

